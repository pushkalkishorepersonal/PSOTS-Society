kind = "web"
previewPath = "/"
title = "PSOTS - Prestige Song of the South"
version = "1.0.0"
id = "artifacts/psots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20043

[services.development]
run = "pnpm --filter @workspace/psots run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/psots", "run", "build" ]
publicDir = "artifacts/psots/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20043"
BASE_PATH = "/"
